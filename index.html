<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COH Diamond Verification</title>

<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  margin:0;
}

header{
  background:#061737;
  color:white;
  padding:15px;
  text-align:center;
}

.verify-box{
  width:90%;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
  text-align:center;
}

input{
  width:70%;
  padding:15px;
  font-size:16px;
}

button{
  padding:15px 20px;
  background:#061737;
  color:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th{
  background:#061737;
  color:white;
  padding:12px;
  text-align:left;
}

td{
  border:1px solid #ddd;
  padding:12px;
}

img{
  margin-top:20px;
  max-width:250px;
  border-radius:10px;
}
</style>

</head>

<body>

<header>
<h2>COH Diamond Verification</h2>
</header>

<div class="verify-box">

<h3>VERIFY YOUR DIAMOND</h3>

<input type="text" id="codeInput" placeholder="Enter Code (e.g. SSD-20001)">
<button onclick="verifyProduct()">VERIFY NOW</button>

<div id="result"></div>

</div>

<script>
const SHEET_URL = "https://opensheet.elk.sh/1jrTes410gkvf0dMwW7TQZd2W9U7e60dcZyMyHbSmaBc/Sheet1";

let currentData = null;

function verifyProduct(){

const code = document.getElementById("codeInput").value.trim().toUpperCase();
const result = document.getElementById("result");

if(!code){
alert("Enter code");
return;
}

result.innerHTML="Checking...";

fetch(SHEET_URL)
.then(res=>res.json())
.then(data=>{

const found = data.find(item => String(item.Code).toUpperCase() === code);

if(!found){
result.innerHTML="<p style='color:red;font-weight:bold'>Invalid Code ❌</p>";
return;
}

currentData = found;

let imageUrl = found.image || found.Image || "";

let html = "<table>";

Object.keys(found).forEach(key=>{
if(key.toLowerCase() !== "image"){
html += `<tr><th>${key}</th><td>${found[key]}</td></tr>`;
}
});

html += "</table>";

if(imageUrl){
html += `<img src="${imageUrl}">`;
}

html += `
<br><br>
<button onclick="downloadCertificate()">Download Certificate</button>
`;

result.innerHTML = html;

})
.catch(()=>{
result.innerHTML="Error loading data";
});

}

function downloadCertificate(){

if(!currentData) return;

let imageUrl = currentData.image || currentData.Image || "";

let cert = `
<html>
<head>
<title>Certificate</title>
<style>
body{font-family:Arial;padding:40px;}
.cert{border:3px solid #061737;padding:30px;}
h1{text-align:center;color:#b78d3f;}
</style>
</head>
<body>

<div class="cert">

<h1>COH Gemological Centre</h1>
<h3 style="text-align:center;">Diamond Verification Certificate</h3>
<hr>

`;

Object.keys(currentData).forEach(key=>{
if(key.toLowerCase() !== "image"){
cert += `<p><b>${key}:</b> ${currentData[key]}</p>`;
}
});

if(imageUrl){
cert += `<img src="${imageUrl}" style="max-width:200px;">`;
}

cert += `
<p style="text-align:center;margin-top:30px;">Verified Product ✔</p>

</div>

<script>
window.onload = function(){window.print();}
<\/script>

</body>
</html>
`;

const win = window.open("");
win.document.write(cert);
win.document.close();

}
</script>

</body>
</html>

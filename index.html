<!DOCTYPE html>
<html>
<head>
  <title>Shri Shyam Diamonds - Verification</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f0f0f;
      color: white;
    }
    .box {
      margin-top: 100px;
    }
    input {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px 20px;
      background: gold;
      border: none;
      cursor: pointer;
      margin-left: 10px;
    }
    .result {
      margin-top: 30px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>💎 Shri Shyam Diamonds</h1>
<h3>Diamond Product Verification</h3>

<div class="box">
  <input type="text" id="code" placeholder="Enter Verification Code">
  <button onclick="verify()">VERIFY</button>

  <div class="result" id="result"></div>
</div>

<script>

<script>
async function verify() {
  let code = document.getElementById("code").value.trim().toUpperCase();
  let result = document.getElementById("result");

  let url = "https://docs.google.com/spreadsheets/d/1jrTes410gkvf0dMwW7TQZd2W9U7e60dcZyMyHbSmaBc/gviz/tq?tqx=out:json";

  let res = await fetch(url);
  let data = await res.text();

  let json = JSON.parse(data.substr(47).slice(0, -2));
  let rows = json.table.rows;

  let found = false;

  for (let i = 0; i < rows.length; i++) {
    let row = rows[i].c;
    let sheetCode = row[0]?.v?.toString().trim().toUpperCase();

    if (sheetCode === code) {
      found = true;

      result.innerHTML = `
        ✅ <b>Authentic Product</b><br><br>
        💎 Product: ${row[1]?.v || ""}<br>
        Diamond: ${row[2]?.v || ""}<br>
        Gold: ${row[3]?.v || ""}<br>
        Date: ${row[4]?.v || ""}<br>
        Status: ${row[6]?.v || "Authentic"}<br><br>
        <img src="${row[5]?.v || ""}" width="200">
      `;
      result.style.color = "lightgreen";
      break;
    }
  }

  if (!found) {
    result.innerHTML = "❌ Invalid Product Code";
    result.style.color = "red";
  }
}
</script>

</script>

</body>
</html>

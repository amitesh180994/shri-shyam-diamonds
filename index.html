<!DOCTYPE html>
<html>
<head>
  <title>Shri Shyam Diamonds - Verification</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f0f0f;
      color: white;
    }
    .box {
      margin-top: 100px;
    }
    input {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px 20px;
      background: gold;
      border: none;
      cursor: pointer;
      margin-left: 10px;
    }
    .result {
      margin-top: 30px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>💎 Shri Shyam Diamonds</h1>
<h3>Diamond Product Verification</h3>

<div class="box">
  <input type="text" id="code" placeholder="Enter Verification Code">
  <button onclick="verify()">VERIFY</button>

  <div class="result" id="result"></div>
</div>

<script>
async function verify() {
  let code = document.getElementById("code").value.trim().toUpperCase();
  let result = document.getElementById("result");

  result.innerHTML = "Checking...";

  try {
    let url = "https://docs.google.com/spreadsheets/d/1jrTes410gkvf0dMwW7TQZd2W9U7e60dcZyMyHbSmaBc/gviz/tq?tqx=out:json";

    let res = await fetch(url);
    let text = await res.text();

    let jsonText = text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1);
    let json = JSON.parse(jsonText);
    let rows = json.table.rows;

    let found = false;

    for (let i = 0; i < rows.length; i++) {
      let c = rows[i].c;
      let sheetCode = c[0]?.v?.toString().trim().toUpperCase();

      if (sheetCode === code) {
        found = true;

          result.innerHTML = `
  ✅ <b>Authentic Product</b><br><br>
  💎 Product: ${c[1]?.v || ""}<br>
  Diamond: ${c[2]?.v || ""}<br>
  Gold: ${c[3]?.v || ""}<br>
  Color: ${c[4]?.v || ""}<br>
  Clarity: ${c[5]?.v || ""}<br>
  Date: ${c[6]?.v || ""}<br>
  Status: ${c[8]?.v || "Authentic"}<br><br>
  <img src="${c[7]?.v || ""}" width="200">
`;
        result.style.color = "lightgreen";
        break;
      }
    }

    if (!found) {
      result.innerHTML = "❌ Invalid Product Code";
      result.style.color = "red";
    }

  } catch (error) {
    result.innerHTML = "⚠️ Sheet connection error";
    result.style.color = "orange";
  }
}
</script>
